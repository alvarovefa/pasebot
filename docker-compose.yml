services:
  database:
    image: mysql:8.0
    container_name: mysql_backend
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-super_secret_root_pass}
      MYSQL_DATABASE: ${DB_NAME:-inventario_db}
      MYSQL_USER: ${DB_USER:-alvaro_dev}
      MYSQL_PASSWORD: ${DB_PASSWORD:-mi_password_seguro}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: node_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=database
      - DB_USER=${DB_USER:-alvaro_dev}
      - DB_PASSWORD=${DB_PASSWORD:-mi_password_seguro}
      - DB_NAME=${DB_NAME:-inventario_db}
      - BACKEND_PORT=5000
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - database

  frontend:
    build: ./frontend
    container_name: react_frontend
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  db_data:
